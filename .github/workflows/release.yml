name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup CMake
      uses: lukka/get-cmake@latest
    
    - name: Generate ICO from SVG
      run: |
        magick assets/triga-logo.svg -define icon:auto-resize=256,128,64,48,32,16 assets/triga-icon.ico
    
    - name: Configure
      working-directory: src-cpp
      run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
      
    - name: Build
      working-directory: src-cpp/build
      run: cmake --build . --config Release --parallel
      
    - name: Install NSIS
      run: |
        choco install nsis -y
      
    - name: Build Installer
      working-directory: .
      run: |
        makensis installer.nsi
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          src-cpp/build/bin/triga_editor.exe
          src-cpp/build/bin/triga_editor.pdb
          src-cpp/build/bin/assets/**/*
          assets/triga-icon.ico
          TRIGA-Setup.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
