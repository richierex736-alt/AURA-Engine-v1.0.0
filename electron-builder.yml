# ============================================================
# KEVLA ENGINE EDITOR — Electron Builder Configuration
# Generates Windows installer (NSIS) and portable builds
# ============================================================

appId: com.kevla.editor
productName: KEVLA Editor
copyright: Copyright © 2026 KEVLA Engine

# ---- Directories ----
directories:
  buildResources: electron/resources
  output: release

# ---- Files to include in the package ----
files:
  - dist/**/*
  - electron/main.js
  - electron/preload.js
  - "!node_modules/**/*"
  - "!src/**/*"
  - "!public/**/*"
  - "!docs/**/*"
  - "!assets/**/*"

# ---- Extra resources (icons, default assets, etc.) ----
extraResources:
  - from: electron/resources/
    to: resources/
    filter:
      - "**/*"
      - "!README.md"

# ---- Application metadata ----
buildVersion: "1.0.0"
artifactName: "KevlaEditor-${version}-Setup.${ext}"

# ============================================================
# Windows NSIS Installer Configuration
# ============================================================
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: electron/resources/icon.ico
  requestedExecutionLevel: asInvoker
  publisherName: KEVLA Engine

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: KEVLA Editor
  artifactName: "KevlaEditor-${version}-Setup.${ext}"
  installerLanguages:
    - en_US
  language: 0x0409
  warningsAsErrors: false
  deleteAppDataOnUninstall: false
  displayLanguageSelector: false
  menuCategory: KEVLA Engine
  runAfterFinish: true

# ============================================================
# macOS Configuration (cross-platform ready)
# ============================================================
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: electron/resources/icon.icns
  category: public.app-category.developer-tools
  hardenedRuntime: true

dmg:
  artifactName: "KevlaEditor-${version}.${ext}"

# ============================================================
# Linux Configuration (cross-platform ready)
# ============================================================
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: electron/resources/icons
  category: Development
  maintainer: KEVLA Engine Team
  desktop:
    Name: KEVLA Editor
    Comment: KEVLA 3D Game Engine Editor
    Categories: Development;IDE;

appImage:
  artifactName: "KevlaEditor-${version}.${ext}"
